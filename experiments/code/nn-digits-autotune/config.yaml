experiment:
  name: nn-digits-autotune
  seeds: [42, 123, 999]
  max_trials_per_seed: 8
  max_iter: 80

baseline:
  hidden_dim: 128
  learning_rate: 0.001
  batch_size: 64
  alpha: 0.0001

search_space:
  hidden_dim: [64, 128, 256]
  learning_rate: [0.01, 0.003, 0.001]
  batch_size: [32, 64]
  alpha: [0.0001, 0.001]
